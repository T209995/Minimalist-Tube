<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body {
            width: 200px;
            padding: 15px;
            font-family: 'Segoe UI', sans-serif;
            background-color: #fff;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h2 {
            margin: 0 0 15px 0;
            font-size: 16px;
            color: #cc0000;
        }
        .switch-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            margin-bottom: 10px;
        }
        .status { font-size: 14px; font-weight: 600; }
        
        /* Toggle Switch CSS */
        .switch {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 22px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ccc;
            transition: .3s;
            border-radius: 34px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }
        input:checked + .slider { background-color: #cc0000; }
        input:checked + .slider:before { transform: translateX(18px); }

        .footer {
            margin-top: 10px;
            font-size: 10px;
            color: #888;
            text-align: center;
            line-height: 1.4;
        }
    </style>
</head>
<body>
    <h2>Minimalist Tube</h2>
    
    <div class="switch-container">
        <span class="status" id="statusText">...</span>
        <label class="switch">
            <input type="checkbox" id="toggleSwitch">
            <span class="slider"></span>
        </label>
    </div>

    <div class="footer">Rafraîchissez la page YouTube si l'effet n'est pas immédiat.</div>

    <script src="popup.js"></script>
</body>
</html>
